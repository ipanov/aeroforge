name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  workflow-and-bom-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic pyyaml httpx numpy networkx jinja2

      - name: Run targeted workflow tests
        run: |
          python -m pytest tests/test_bom.py tests/test_bom_sync.py tests/test_orchestrator_workflow.py -q
