name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic pyyaml httpx numpy networkx jinja2 ezdxf

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_rpc_helper.py \
            -m "not hardware" \
            -q --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run ruff check (core modules)
        run: |
          ruff check \
            src/orchestrator/ \
            src/providers/ \
            tests/ \
            --select E,F,W --ignore E501,F401,E402
