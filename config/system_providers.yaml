# System-level providers — shared across ALL projects.
# These depend on local hardware (GPU, installed software), not on project decisions.
# Configured once during system setup, applied to every project.

cfd:
  selected: su2_cuda
  fallback: su2_cpu
  config:
    num_processors: 4
    use_gpu: true

fea:
  selected: freecad_calculix
  config:
    freecad_path: auto  # Auto-detected during system setup; override with absolute path

airfoil:
  selected: neuralfoil

# Hardware profile (populated by detect_hardware() during setup)
# Hardware profile is populated by detect_hardware() during system setup.
# Do not hardcode user-specific values here.
hardware: {}
